<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Serveur - Espace La Voisine</title>
    <!-- Bootstrap 5 pour un rendu rapide et responsive -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .btn-primary-custom {
            background-color: #2c3e50;
            border-color: #2c3e50;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
        }
        .btn-primary-custom:hover {
            background-color: #1a252f;
            border-color: #1a252f;
        }
    </style>
</head>
<body>

<div class="container px-4">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <!-- En-tête de la page -->
            <div class="text-center mb-4">
                <div class="mb-2 text-dark fs-1">
                    <i class="fa-solid fa-utensils"></i>
                </div>
                <h3 class="fw-bold text-dark mb-0">Espace La Voisine</h3>
                <span class="text-muted small">Portail d'accès unique</span>
            </div>

            <!-- Affichage des messages d'erreur Django -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show rounded-3 shadow-sm" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Formulaire -->
            <div class="card card-login p-4">
                <div class="card-body">
                    <h5 class="fw-bold mb-4 text-center">Identifiez-vous</h5>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <!-- Identifiant -->
                        <div class="mb-3">
                            <label for="username" class="form-label text-muted small fw-bold">Nom d'utilisateur</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted">
                                    <i class="fa-regular fa-user"></i>
                                </span>
                                <input type="text" name="username" id="username" class="form-control border-start-0 ps-0" placeholder="Ex: serveur_sarah" required>
                            </div>
                        </div>

                        <!-- Mot de passe -->
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted small fw-bold">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input type="password" name="password" id="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- Bouton Se connecter -->
                        <button type="submit" class="btn btn-primary-custom w-100 text-white">
                            Se connecter <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                    
                </div>
            </div>
            
            <p class="text-center text-muted small mt-4">RestoFast S.I © 2026</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
