<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Chez La Voisine</title>
    <!-- Bootstrap Icons pour les icônes de boisson et d'utilisateur -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* En-tête avec l'icône de boisson */
        .brand-header {
            margin-bottom: 25px;
        }

        .brand-icon-wrapper {
            width: 70px;
            height: 70px;
            background-color: #eff6ff;
            color: #2563eb;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .brand-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #64748b;
        }

        /* Message d'erreur */
        .error-message {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: #94a3b8;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Bouton */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            border: none;
            color: #ffffff;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- En-tête de marque -->
    <div class="brand-header">
        <div class="brand-icon-wrapper">
            <i class="bi bi-cup-straw"></i>
        </div>
        <h1 class="brand-title">Chez La Voisine</h1>
        <p class="brand-subtitle">Gestion des commandes & encaissements</p>
    </div>

    <!-- Message d'erreur -->
    {% if form.errors %}
        <div class="error-message">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>Identifiants incorrects. Réessayez.</span>
        </div>
    {% endif %}

    <!-- Formulaire -->
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_username">Nom d'utilisateur</label>
            <div class="input-wrapper">
                <i class="bi bi-person"></i>
                <input type="text" name="username" id="id_username" placeholder="Entrez votre identifiant" required autofocus>
            </div>
        </div>

        <div class="form-group">
            <label for="id_password">Mot de passe</label>
            <div class="input-wrapper">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <span>Se connecter</span>
            <i class="bi bi-arrow-right-short" style="font-size: 20px;"></i>
        </button>
    </form>

    <div class="footer-text">
        &copy; Chez La Voisine — Tous droits réservés
    </div>
</div>

</body>
</html>
